name: Meridian
options:
  bundleIdPrefix: dev.meridian
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_HARDENED_RUNTIME: true
    CODE_SIGN_STYLE: Automatic

packages:
  WorkspaceUI: { path: Packages/WorkspaceUI }
  SearchKit: { path: Packages/SearchKit }
  FileKit: { path: Packages/FileKit }
  PluginHost: { path: Packages/PluginHost }
  SettingsKit: { path: Packages/SettingsKit }
  EditorUI: { path: Packages/EditorUI }
  DocumentCore: { path: Packages/DocumentCore }

targets:
  Meridian:
    type: application
    platform: macOS
    sources: [App]
    dependencies:
      - package: WorkspaceUI
      - package: SearchKit
      - package: FileKit
      - package: PluginHost
      - package: SettingsKit
      - package: EditorUI
      - package: DocumentCore
    info:
      path: App/Resources/Info.plist
      properties:
        CFBundleName: Meridian
        CFBundleDisplayName: Meridian
        LSMinimumSystemVersion: "15.0"
        NSPrincipalClass: NSApplication
        NSHumanReadableCopyright: ""
        CFBundleDocumentTypes:
          - CFBundleTypeName: Plain Text
            LSItemContentTypes: [public.plain-text]
            CFBundleTypeRole: Editor
            NSDocumentClass: Meridian.MeridianDocument
            LSHandlerRank: Alternate
    entitlements:
      path: App/Resources/Meridian.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true

  MeridianUITests:
    type: bundle.ui-testing
    platform: macOS
    sources: [Tests/UITests]
    settings:
      GENERATE_INFOPLIST_FILE: YES
    entitlements:
      path: Tests/UITests/MeridianUITests.entitlements
      properties:
        com.apple.security.cs.disable-library-validation: true
    dependencies:
      - target: Meridian

schemes:
  Meridian:
    build:
      targets:
        Meridian: all
        MeridianUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets: [MeridianUITests]
