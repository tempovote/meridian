name: Meridian
options:
  bundleIdPrefix: dev.meridian
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_HARDENED_RUNTIME: true
    CODE_SIGN_STYLE: Automatic

packages:
  WorkspaceUI: { path: Packages/WorkspaceUI }
  SearchKit: { path: Packages/SearchKit }
  FileKit: { path: Packages/FileKit }
  PluginHost: { path: Packages/PluginHost }
  SettingsKit: { path: Packages/SettingsKit }
  EditorUI: { path: Packages/EditorUI }
  DocumentCore: { path: Packages/DocumentCore }

targets:
  Meridian:
    type: application
    platform: macOS
    sources: [App]
    dependencies:
      - package: WorkspaceUI
      - package: SearchKit
      - package: FileKit
      - package: PluginHost
      - package: SettingsKit
      - package: EditorUI
      - package: DocumentCore
    info:
      path: App/Resources/Info.plist
      properties:
        CFBundleName: Meridian
        CFBundleDisplayName: Meridian
        LSMinimumSystemVersion: "15.0"
        NSPrincipalClass: NSApplication
        NSHumanReadableCopyright: ""
        # public.text is the true common ancestor for essentially every
        # text-based system UTI (verified via `lsregister -dump`): plain
        # source files conform to it via public.plain-text, but several of
        # M4 Phase 2's grammar-bundled languages have a macOS-provided UTI
        # (public.yaml, public.toml, public.css, public.html, public.xml,
        # com.microsoft.typescript, ...) that conforms directly to
        # public.text as a SIBLING of public.plain-text, not a descendant
        # of it — so declaring only public.plain-text (as this app did
        # through M3/M4 Phase 1) left the Open panel refusing those files
        # even though SyntaxKit fully supports the grammar. Declaring
        # public.text directly covers every text-conforming UTI on the
        # system, present or future, without hand-maintaining an
        # extension list in sync with EditorUI's languageID(forFileExtension:).
        CFBundleDocumentTypes:
          - CFBundleTypeName: Text
            LSItemContentTypes: [public.text]
            CFBundleTypeRole: Editor
            NSDocumentClass: Meridian.MeridianDocument
            LSHandlerRank: Alternate
          - CFBundleTypeName: JSON
            LSItemContentTypes: [public.json]
            CFBundleTypeRole: Editor
            NSDocumentClass: Meridian.MeridianDocument
            LSHandlerRank: Alternate
          # Bare .ts resolves system-wide to public.mpeg-2-transport-stream
          # (MPEG video, predates TypeScript's extension) rather than
          # com.microsoft.typescript, so it does NOT conform to public.text
          # no matter what UTI we declare — verified via
          # UTType(filenameExtension: "ts").conforms(to: .text) == false.
          # .tsx has no such collision. Legacy extension-based matching
          # (independent of UTI conformance) is the standard remedy.
          - CFBundleTypeName: TypeScript
            CFBundleTypeExtensions: [ts]
            CFBundleTypeRole: Editor
            NSDocumentClass: Meridian.MeridianDocument
            LSHandlerRank: Alternate
          - CFBundleTypeName: Source Code
            LSItemContentTypes: [dev.meridian.source-code]
            CFBundleTypeRole: Editor
            NSDocumentClass: Meridian.MeridianDocument
            LSHandlerRank: Alternate
        # public.text alone isn't sufficient: a handful of extensions have
        # NO macOS-provided UTI at all (verified via
        # UTType(filenameExtension:) resolving to an unclaimed dyn.* type
        # that conforms to nothing) — currently cjs, rs, go on this
        # machine, though the exact set can vary by macOS version. Declare
        # a fallback UTI conforming to public.text (NOT public.plain-text —
        # see the CFBundleDocumentTypes comment above for why that was
        # wrong) covering every extension EditorUI's
        # languageID(forFileExtension:) recognizes, so an extension losing
        # its system UTI on some other machine/OS version doesn't silently
        # regress into unopenable again.
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: dev.meridian.source-code
            UTTypeDescription: Source Code
            UTTypeConformsTo: [public.text]
            UTTypeTagSpecification:
              public.filename-extension:
                [
                  js, mjs, cjs, ts, tsx, html, htm, css, py, yml, yaml, toml,
                  sh, bash, c, h, cpp, cc, hpp, cxx, rs, go, java, rb, php,
                  md, markdown, xml,
                ]
    entitlements:
      path: App/Resources/Meridian.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true

  # MeridianUITests requires ad-hoc signing for `xcodebuild test` (via
  # CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=YES CODE_SIGNING_ALLOWED=YES).
  # An unsigned test runner is killed by Gatekeeper on launch.
  MeridianUITests:
    type: bundle.ui-testing
    platform: macOS
    sources: [Tests/UITests]
    settings:
      GENERATE_INFOPLIST_FILE: YES
    entitlements:
      path: Tests/UITests/MeridianUITests.entitlements
      properties:
        com.apple.security.cs.disable-library-validation: true
    dependencies:
      - target: Meridian

schemes:
  Meridian:
    build:
      targets:
        Meridian: all
        MeridianUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets: [MeridianUITests]
