name: Meridian
options:
  bundleIdPrefix: dev.meridian
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_HARDENED_RUNTIME: true
    CODE_SIGN_STYLE: Automatic

packages:
  WorkspaceUI: { path: Packages/WorkspaceUI }
  SearchKit: { path: Packages/SearchKit }
  FileKit: { path: Packages/FileKit }
  PluginHost: { path: Packages/PluginHost }
  SettingsKit: { path: Packages/SettingsKit }
  EditorUI: { path: Packages/EditorUI }
  DocumentCore: { path: Packages/DocumentCore }

targets:
  Meridian:
    type: application
    platform: macOS
    sources: [App]
    dependencies:
      - package: WorkspaceUI
      - package: SearchKit
      - package: FileKit
      - package: PluginHost
      - package: SettingsKit
      - package: EditorUI
      - package: DocumentCore
    info:
      path: App/Resources/Info.plist
      properties:
        CFBundleName: Meridian
        CFBundleDisplayName: Meridian
        LSMinimumSystemVersion: "15.0"
        NSPrincipalClass: NSApplication
        NSHumanReadableCopyright: ""
        CFBundleDocumentTypes:
          - CFBundleTypeName: Plain Text
            LSItemContentTypes: [public.plain-text]
            CFBundleTypeRole: Editor
            NSDocumentClass: Meridian.MeridianDocument
            LSHandlerRank: Alternate
          - CFBundleTypeName: JSON
            LSItemContentTypes: [public.json]
            CFBundleTypeRole: Editor
            NSDocumentClass: Meridian.MeridianDocument
            LSHandlerRank: Alternate
          - CFBundleTypeName: Source Code
            LSItemContentTypes: [dev.meridian.source-code]
            CFBundleTypeRole: Editor
            NSDocumentClass: Meridian.MeridianDocument
            LSHandlerRank: Alternate
        # Many of M4 Phase 2's grammar-bundled languages (rust, toml, yaml,
        # typescript, go, php, css, markdown, ...) have no macOS-provided
        # system UTI conforming to public.plain-text, so the Open panel
        # would refuse to let the user pick them despite SyntaxKit fully
        # supporting the grammar — declare our own UTI covering every
        # extension EditorUI's languageID(forFileExtension:) recognizes
        # (see Packages/EditorUI/Sources/EditorUI/LanguageExtensionMap.swift)
        # beyond the two (json, swift) already covered by system UTIs above.
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: dev.meridian.source-code
            UTTypeDescription: Source Code
            UTTypeConformsTo: [public.plain-text]
            UTTypeTagSpecification:
              public.filename-extension:
                [
                  js, mjs, cjs, ts, tsx, html, htm, css, py, yml, yaml, toml,
                  sh, bash, c, h, cpp, cc, hpp, cxx, rs, go, java, rb, php,
                  md, markdown, xml,
                ]
    entitlements:
      path: App/Resources/Meridian.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true

  # MeridianUITests requires ad-hoc signing for `xcodebuild test` (via
  # CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=YES CODE_SIGNING_ALLOWED=YES).
  # An unsigned test runner is killed by Gatekeeper on launch.
  MeridianUITests:
    type: bundle.ui-testing
    platform: macOS
    sources: [Tests/UITests]
    settings:
      GENERATE_INFOPLIST_FILE: YES
    entitlements:
      path: Tests/UITests/MeridianUITests.entitlements
      properties:
        com.apple.security.cs.disable-library-validation: true
    dependencies:
      - target: Meridian

schemes:
  Meridian:
    build:
      targets:
        Meridian: all
        MeridianUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets: [MeridianUITests]
