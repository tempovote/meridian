name: ADR proposal
description: Propose an architectural decision or change
labels: ["type:adr"]
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What forces are at play? Which existing ADRs does this touch?
    validations:
      required: true
  - type: textarea
    id: decision
    attributes:
      label: Proposed decision
    validations:
      required: true
  - type: textarea
    id: consequences
    attributes:
      label: Consequences
    validations:
      required: true
