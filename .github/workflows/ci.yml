name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install linters
        run: brew install swiftformat swiftlint
      - name: SwiftFormat (lint mode)
        run: swiftformat --lint .
      - name: SwiftLint
        run: swiftlint --strict
      - name: Layer purity
        run: Scripts/lint-imports.sh

  test:
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        package:
          - DocumentCore
          - SyntaxKit
          - SearchKit
          - FileKit
          - ThemeKit
          - SettingsKit
          - EditorUI
          - WorkspaceUI
          - PluginAPI
          - PluginHost
    steps:
      - uses: actions/checkout@v4
      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: Packages/${{ matrix.package }}/.build
          key: spm-${{ runner.os }}-${{ matrix.package }}-${{ hashFiles(format('Packages/{0}/Package.swift', matrix.package)) }}
      - name: Build (warnings as errors)
        run: swift build --package-path Packages/${{ matrix.package }} -Xswiftc -warnings-as-errors
      - name: Test
        run: swift test --package-path Packages/${{ matrix.package }}
