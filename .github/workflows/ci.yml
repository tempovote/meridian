name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install linters (SwiftFormat pinned)
        run: |
          SWIFTFORMAT_VERSION=0.62.1  # keep in sync with README "Tooling"
          curl -fsSL -o /tmp/swiftformat.zip \
            "https://github.com/nicklockwood/SwiftFormat/releases/download/${SWIFTFORMAT_VERSION}/swiftformat.zip"
          unzip -o /tmp/swiftformat.zip -d /tmp/swiftformat
          mkdir -p "$RUNNER_TEMP/pinned-bin"
          install -m 755 "$(find /tmp/swiftformat -name swiftformat -type f | head -1)" "$RUNNER_TEMP/pinned-bin/swiftformat"
          # Runner images ship a pre-installed SwiftFormat under /opt/homebrew/bin,
          # which precedes /usr/local/bin on PATH and silently shadows a pinned
          # install there. Prepend our pinned copy via GITHUB_PATH instead, so it
          # wins for every later step in this job regardless of image contents.
          echo "$RUNNER_TEMP/pinned-bin" >> "$GITHUB_PATH"
          RESOLVED_VERSION="$("$RUNNER_TEMP/pinned-bin/swiftformat" --version)"
          echo "Pinned SwiftFormat version: $RESOLVED_VERSION"
          if [ "$RESOLVED_VERSION" != "$SWIFTFORMAT_VERSION" ]; then
            echo "::error::Downloaded SwiftFormat reports $RESOLVED_VERSION, expected $SWIFTFORMAT_VERSION"
            exit 1
          fi
          brew install swiftlint
      - name: SwiftFormat (lint mode)
        run: swiftformat --lint .
      - name: SwiftLint
        run: swiftlint --strict
      - name: Layer purity
        run: Scripts/lint-imports.sh

  test:
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        package:
          - DocumentCore
          - SyntaxKit
          - SearchKit
          - FileKit
          - ThemeKit
          - SettingsKit
          - EditorUI
          - WorkspaceUI
          - PluginAPI
          - PluginHost
    steps:
      - uses: actions/checkout@v4
      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: Packages/${{ matrix.package }}/.build
          key: spm-${{ runner.os }}-${{ matrix.package }}-${{ hashFiles(format('Packages/{0}/Package.swift', matrix.package), format('Packages/{0}/Package.resolved', matrix.package)) }}
          restore-keys: |
            spm-${{ runner.os }}-${{ matrix.package }}-
      - name: Build (warnings as errors)
        run: swift build --package-path Packages/${{ matrix.package }} -Xswiftc -warnings-as-errors
      - name: Test
        run: swift test --package-path Packages/${{ matrix.package }} -Xswiftc -warnings-as-errors

  app:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Build app (debug, unsigned)
        run: >
          xcodebuild build -project Meridian.xcodeproj -scheme Meridian
          -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO
